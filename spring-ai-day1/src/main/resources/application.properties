# =============================================
#  Spring AI - Day 1 Configuration
#  Using Groq as our FREE AI provider
#  Groq is 100% OpenAI-API compatible,
#  so Spring AI's OpenAI starter works perfectly.
# =============================================

server.port=8080

# --- Groq API Key ---
# Replace with YOUR key from https://console.groq.com/keys
spring.ai.openai.api-key=${GROQ_API_KEY}

# --- Point Spring AI to Groq's servers instead of OpenAI ---
spring.ai.openai.base-url=https://api.groq.com/openai

# --- Choose a free Groq model ---
# llama-3.3-70b-versatile is fast and very capable
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Optional: control randomness (0.0 = focused, 1.0 = creative)
spring.ai.openai.chat.options.temperature=0.7
